<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tempus AI Copilot - Provider Intelligence</title>
  
  <!-- IBM Plex Sans Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"IBM Plex Sans"', 'sans-serif'],
          },
          colors: {
            tempus: {
              black: '#121212',
              dark: '#1c1e22',
              gray: '#e8eaed',
              text: '#333333',
              link: '#3a7bd5'
            }
          }
        }
      }
    }
  </script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    /* Hide scrollbar for clean UI */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D1D1D6; border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: #C7C7CC; }
    
    /* Specific styling for panel scrollbars if needed */
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #D1D1D6;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #C7C7CC;
    }
  </style>
</head>
<body class="bg-slate-50 h-screen overflow-hidden text-slate-800">
  <div id="root" class="h-full flex flex-col"></div>
  <script>
    document.write('<script src="data.js?v=' + Date.now() + '"><\/script>');
    document.write('<script type="text/babel" data-type="module" src="app.jsx?v=' + Date.now() + '"><\/script>');
  </script>
</body>
</html>
